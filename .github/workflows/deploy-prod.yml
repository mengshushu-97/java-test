name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type deploy-prod to confirm production deployment
        required: true

concurrency:
  group: java-test-prod
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  deploy:
    name: Build and deploy java-test to prod
    if: ${{ github.event.inputs.confirm == 'deploy-prod' }}
    runs-on:
      - self-hosted
      - k3s
      - prod
    environment: production
    env:
      APP_NAME: java-test
      CONTAINER_NAME: java-test
      NAMESPACE: prod
      MANIFEST_FILE: k8s/prod/deployment.yaml
      HARBOR_REGISTRY: harbor.local
      HARBOR_PROJECT: prod
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Runner preflight
        env:
          CHECK_NAMESPACE: prod
        run: ./scripts/check-runner-prereqs.sh

      - name: Test
        run: |
          MAVEN_CACHE_DIR="$HOME/.cache/maven/java-test"
          mkdir -p "$MAVEN_CACHE_DIR"
          cat > "$MAVEN_CACHE_DIR/settings.xml" <<'EOF'
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0">
            <mirrors>
              <mirror>
                <id>aliyunmaven</id>
                <mirrorOf>*</mirrorOf>
                <name>Aliyun Maven</name>
                <url>https://maven.aliyun.com/repository/public</url>
              </mirror>
            </mirrors>
          </settings>
          EOF
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/workspace" \
            -v "$MAVEN_CACHE_DIR:/tmp/.m2" \
            -w /workspace \
            -e HOME=/tmp \
            maven:3.9-eclipse-temurin-17 \
            sh -lc 'mvn -s /tmp/.m2/settings.xml -Dmaven.repo.local=/tmp/.m2/repository test'

      - name: Build and push Harbor image
        run: ./scripts/build-push-harbor.sh

      - name: Update GitOps manifest
        env:
          IMAGE: harbor.local/prod/java-test:${{ github.sha }}
        run: ./scripts/update-k8s-image.sh

      - name: Commit GitOps manifest
        run: |
          if git diff --quiet -- "$MANIFEST_FILE"; then
            echo "No manifest changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$MANIFEST_FILE"
          git commit -m "chore(cicd): deploy $APP_NAME $IMAGE_TAG [skip ci]"
          git pull --rebase
          git push
