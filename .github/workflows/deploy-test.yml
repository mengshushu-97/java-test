name: Deploy Test

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: java-test-test
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Build and deploy java-test
    runs-on:
      - self-hosted
      - k3s
      - test
    env:
      APP_NAME: java-test
      CONTAINER_NAME: java-test
      NAMESPACE: test
      MANIFEST_DIR: k8s/test
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: |
          mkdir -p /tmp/m2-java-test
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v /tmp/m2-java-test:/root/.m2 \
            -w /workspace \
            maven:3.9-eclipse-temurin-17 \
            mvn test

      - name: Build local image and deploy to k3s
        run: ./scripts/deploy-local-k3s.sh
