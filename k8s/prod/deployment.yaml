apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-test
  namespace: prod
  labels:
    app.kubernetes.io/name: java-test
    app.kubernetes.io/part-of: demo-chain
spec:
  replicas: 2
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: java-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: java-test
        app.kubernetes.io/part-of: demo-chain
    spec:
      terminationGracePeriodSeconds: 45
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - java-test
                topologyKey: kubernetes.io/hostname
      imagePullSecrets:
        - name: harbor-auth
      containers:
        - name: java-test
          image: harbor.local/prod/java-test:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: java-test
            - name: APP_ENV
              value: prod
            - name: PORT
              value: "8080"
            - name: NODE_SERVICE_URL
              value: http://node-test:3000
            - name: AGENT_SERVICE_URL
              value: http://agent-test:8000
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_INSTRUMENTATION_LOGGING_MDC_ENABLED
              value: "true"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=prod,service.namespace=demo
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 300m
              memory: 768Mi
            limits:
              cpu: 1500m
              memory: 1536Mi
---
apiVersion: v1
kind: Service
metadata:
  name: java-test
  namespace: prod
  labels:
    app.kubernetes.io/name: java-test
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: java-test
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: java-test
  namespace: prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: java-test
