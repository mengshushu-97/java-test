apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-test
  namespace: test
  labels:
    app.kubernetes.io/name: java-test
    app.kubernetes.io/part-of: demo-chain
spec:
  replicas: 2
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: java-test
  template:
    metadata:
      labels:
        app.kubernetes.io/name: java-test
        app.kubernetes.io/part-of: demo-chain
    spec:
      imagePullSecrets:
        - name: harbor-auth
      containers:
        - name: java-test
          image: harbor.local/test/java-test:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: SERVICE_NAME
              value: java-test
            - name: APP_ENV
              value: test
            - name: PORT
              value: "8080"
            - name: NODE_SERVICE_URL
              value: http://node-test:3000
            - name: AGENT_SERVICE_URL
              value: http://agent-test:8000
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector-opentelemetry-collector.observability.svc.cluster.local:4318
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: http/protobuf
            - name: OTEL_INSTRUMENTATION_LOGGING_MDC_ENABLED
              value: "true"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: deployment.environment=test,service.namespace=demo
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: java-test
  namespace: test
  labels:
    app.kubernetes.io/name: java-test
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: java-test
  ports:
    - name: http
      port: 8080
      targetPort: http
